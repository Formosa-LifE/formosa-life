<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙母語音標組字查詢器 (Word Builder)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
        .zhuyin-font { font-family: 'BiauKai', 'DFKai-SB', serif; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .card-active { ring: 2px solid #3b82f6; }

        /* 音節欄位共用樣式 */
        .syllable-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 0.25rem;
            padding: 0.25rem;
            background-color: rgba(255, 255, 255, 0.6);
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            transition: all 0.2s;
            max-width: 140px; /* 全域最大寬度 */
        }
        @media (min-width: 768px) {
            .syllable-col {
                gap: 0.5rem;
                padding: 0.75rem;
                border-radius: 1rem;
                max-width: 160px;
            }
        }
        .syllable-col:hover {
            background-color: rgba(59, 130, 246, 0.05);
            border-color: #93c5fd;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        /* 修改點：針對長短單字應用不同精確縮放邏輯 */
        /* 1. 短單字模式 (< 6 音節)：平均分配寬度，允許自動縮小以適應螢幕 */
        .mode-short .syllable-col {
            flex: 1 1 0%;
            min-width: 0;
        }
        /* 2. 長單字模式 (>= 6 音節)：強制寬度為「畫面能塞下剛好 5 個」，多出部分橫向捲動 */
        .mode-long .syllable-col {
            /* (100% - 4個間距的總和) / 5 = 剛好塞滿 5 個音節的精確寬度 */
            /* 手機版 gap-1.5 = 0.375rem, (0.375 * 4) / 5 = 0.3rem */
            flex: 0 0 calc(20% - 0.3rem);
            min-width: 0;
        }
        @media (min-width: 768px) {
            .mode-long .syllable-col {
                /* 平板以上 gap-3 = 0.75rem, (0.75 * 4) / 5 = 0.6rem */
                flex: 0 0 calc(20% - 0.6rem);
            }
        }
        /* 自訂橫向滾動條樣式 */
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 transparent;
            -webkit-overflow-scrolling: touch;
        }
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
    </style>
</head>

        // 核心查詢 API 功能

        async function handleSearch() {
            // 強制移除輸入框焦點，讓手機鍵盤順利收合
            wordInput.blur();

            // 將畫面溫和地滾動至最上方
            window.scrollTo({
                top: 0,
                left: 0,
                behavior: 'smooth'
            });
            const word = wordInput.value.trim();
            if (!word) {
                clearInput();
                return;
            }
            // UI 狀態切換至 Loading
            wordInput.disabled = true;
            const searchIcon = document.getElementById('searchBtnIcon');
            searchIcon.classList.replace('fa-search', 'fa-spinner');
            searchIcon.classList.add('fa-spin');
            try {
                const response = await fetch(`${GAS_PROXY_URL}?word=${encodeURIComponent(word)}`, {
                    method: 'GET',
                    redirect: 'follow'
                });
                const data = await response.json();
                if (data.error) {
                    console.error("GAS Server Error:", data.error);
                    showToast('後端發生錯誤，請稍後再試', true);
                    clearDisplay();
                    return;
                }
                if (!data || data.length === 0 || typeof data[0] === 'string') {
                    showToast('找不到此單字，請確認拼字', true);
                    clearDisplay();
                    return;
                }
                const entry = data[0];
                const hwi = entry.hwi;

                if (!hwi || !hwi.prs || hwi.prs.length === 0) {
                    showToast('字典中無此單字的音標資訊', true);
                    clearDisplay();
                    return;
                }
                // 擷取所需資訊
                const mwPhonetic = hwi.prs[0].mw;
                const audioName = hwi.prs[0].sound ? hwi.prs[0].sound.audio : null;
                const defs = entry.shortdef ? entry.shortdef.slice(0, 2) : []; // 取前兩個定義
                // 更新 UI 資訊區塊
                displayWordInfo(word, mwPhonetic, defs, audioName);
                // 將音標傳入進行解析與渲染
                processInput(mwPhonetic);
            } catch (err) {
                console.error("Fetch Error:", err);
                showToast('網路連線或 GAS 伺服器發生錯誤', true);
                clearDisplay();
            } finally {
                wordInput.disabled = false;
                searchIcon.classList.remove('fa-spin');
                searchIcon.classList.replace('fa-spinner', 'fa-search');
            }

            const defList = document.getElementById('definitionList');
            const playBtn = document.getElementById('playAudioBtn');
            infoArea.classList.remove('hidden');

            displayWord.innerHTML = `${word} <span class="text-base text-blue-500 font-mono font-normal ml-2">/${mw}/</span>`;

            if (defs.length > 0) {
                defList.innerHTML = defs.map(d => `<li>${d}</li>`).join('');
                defList.classList.remove('hidden');
            } else {
                defList.classList.add('hidden');
            }
            if (audioName) {
                playBtn.classList.remove('hidden');

                let subdir = audioName.charAt(0);
                if (audioName.startsWith("bix")) subdir = "bix";
                else if (audioName.startsWith("gg")) subdir = "gg";
                else if (/^[^a-zA-Z]/.test(audioName)) subdir = "number";

                currentAudioUrl = `https://media.merriam-webster.com/audio/prons/en/us/mp3/${subdir}/${audioName}.mp3`;
            } else {
                playBtn.classList.add('hidden');
                currentAudioUrl = null;
            }
        }
        function playAudio() {
            if (currentAudioUrl) {
                audioPlayer.src = currentAudioUrl;
                audioPlayer.play().catch(e => showToast('播放音檔失敗', true));
            }
        }
        function clearDisplay() {
            wordContainer.innerHTML = '';
            wordContainer.appendChild(welcomeState);
            // 重設為預設短單字狀態
            wordContainer.className = "mode-short flex flex-row flex-nowrap w-full overflow-x-auto custom-scrollbar pb-2 md:pb-4 justify-center items-start gap-1 md:gap-3 px-1 mx-auto";
            parseStatus.innerHTML = '';
            document.getElementById('wordInfoArea').classList.add('hidden');
            currentAudioUrl = null;
        }
        function clearInput() {
            wordInput.value = '';
            clearDisplay();
        }
        function showToast(msg, isError = false) {
            toastMsg.textContent = msg;
            toast.classList.remove('opacity-0');
            if (isError) {
                toast.querySelector('i').classList.replace('fa-check-circle', 'fa-exclamation-circle');
                toast.querySelector('i').classList.replace('text-green-400', 'text-red-400');
            } else {
                toast.querySelector('i').className = 'fa-solid fa-check-circle text-green-400';
            }

            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }
        // ==========================================
        // 圖卡與音節解析邏輯
        // ==========================================
        function processInput(input) {
            const cleanInput = input.replace(/\\/g, '').replace(/\//g, '').replace(/[ ·]/g, '-');
            const syllableRawStrings = cleanInput.split('-');

            let syllables = [];
            let allTokens = [];
            syllableRawStrings.forEach(sylStr => {
                let tokenInput = sylStr.trim();
                if(!tokenInput) return;
                let tokens = [];
                let remaining = tokenInput.toLowerCase();
                remaining = remaining.replace(/'/g, "ˈ");
                while (remaining.length > 0) {
                    let matched = false;
                    // 遇到重音符號或括號直接切出為獨立 Token
                    if (remaining.startsWith("ˈ") || remaining.startsWith("ˌ") || remaining.startsWith("(") || remaining.startsWith(")")) {
                        tokens.push(remaining[0]);
                        remaining = remaining.slice(1);
                        matched = true;
                        continue;
                    }
                    for (const key of sortedKeys) {
                        if (remaining.startsWith(key)) {
                            tokens.push(key);
                            remaining = remaining.slice(key.length);
                            matched = true;
                            break;
                        }
                    }

                    if (!matched) {
                        tokens.push(remaining[0]);
                        remaining = remaining.slice(1);
                    }
                }

                if (tokens.length > 0) {
                    syllables.push(tokens);
                    allTokens = allTokens.concat(tokens);
                }
            });
            parseStatus.innerHTML = allTokens.map(t => {
                if (t === 'ˈ' || t === 'ˌ') return `<span class="bg-yellow-100 text-yellow-800 px-1 rounded mx-0.5 font-serif font-bold">${t}</span>`;
                if (t === '(' || t === ')') return `<span class="bg-slate-200 text-slate-700 px-1 rounded mx-0.5 font-serif font-bold">${t}</span>`;
                return `<span class="bg-blue-100 text-blue-800 px-1 rounded mx-0.5">${t}</span>`;
            }).join(' <span class="text-gray-300 mx-2">|</span> ');
            renderSyllables(syllables);
        }
        function renderSyllables(syllables) {
            wordContainer.innerHTML = '';
            // 依據音節數量決定顯示模式
            if (syllables.length >= 6) {
                // 長單字：套用 mode-long，靠左對齊以便產生滾動條向右滑
                wordContainer.className = "mode-long flex flex-row flex-nowrap w-full overflow-x-auto custom-scrollbar pb-2 md:pb-4 justify-start items-start gap-1.5 md:gap-3 px-2 mx-auto";
            } else {
                // 短單字：套用 mode-short，置中對齊並自動縮放維持在一個畫面內
                wordContainer.className = "mode-short flex flex-row flex-nowrap w-full overflow-x-auto custom-scrollbar pb-2 md:pb-4 justify-center items-start gap-1 md:gap-3 px-1 mx-auto";
            }
            syllables.forEach((tokens, sylIndex) => {
                const col = document.createElement('div');
                col.className = "syllable-col";
                // 新增：精確的母音與 'r' 規則判讀
                let isTokenVowel = new Array(tokens.length).fill(false);
                let lastValidIndex = -1;
                // 階段 1：初步標記所有「可能是母音」的符號，並找出最後一個有效符號
                tokens.forEach((t, idx) => {
                    if (t !== 'ˈ' && t !== 'ˌ' && t !== '(' && t !== ')') {
                        lastValidIndex = idx;
                    }
                    const variants = groupedData[t];
                    if (variants && variants.some(v => v.type.includes('母'))) {
                        isTokenVowel[idx] = true;
                    }
                });
                // 階段 2：處理 'r' 的特殊規則
                // 若 'r' 位於其他母音前，取消其母音標記，將其視為頭子音處理
                tokens.forEach((t, idx) => {
                    if (t.toLowerCase() === 'r' && isTokenVowel[idx]) {
                        let hasVowelAfter = false;
                        for (let j = idx + 1; j < tokens.length; j++) {
                            if (isTokenVowel[j]) {
                                hasVowelAfter = true;
                                break;
                            }
                        }
                        if (hasVowelAfter) {
                            isTokenVowel[idx] = false; // 'r' 在此處作為頭子音
                        }
                    }
                });
                // 階段 3：確立該音節中第一個與最後一個母音的最終位置
                let firstVowelIndex = -1;
                let lastVowelIndex = -1;
                isTokenVowel.forEach((isVowel, idx) => {
                    if (isVowel) {
                        if (firstVowelIndex === -1) firstVowelIndex = idx;
                        lastVowelIndex = idx;
                    }
                });
                tokens.forEach((token, index) => {
                    // 若為重音符號
                    if (token === 'ˈ' || token === 'ˌ') {
                        col.appendChild(createStressCard(token));
                        return;
                    }
                    // 若為括號 (通常代表音節/音素可省略)
                    if (token === '(' || token === ')') {
                        col.appendChild(createPunctuationCard(token));
                        return;
                    }
                    const variants = groupedData[token];
                    if (!variants) {
                        col.appendChild(createUnknownCard(token));
                        return;
                    }
                    let selectedIndex = 0;
                    if (variants.length > 1) {
                        // 使用已精確判斷的 isTokenVowel 陣列
                        const isVowel = isTokenVowel[index];
                        if (isVowel) {
                            // 自身是母音，選擇母音變體
                            selectedIndex = variants.findIndex(v => v.type.includes('母'));
                        } else {
                            // 自身是子音，根據其與母音的相對位置判斷
                            if (firstVowelIndex !== -1) {
                                if (index < firstVowelIndex) {
                                    // 在母音前的子音 -> 頭子音
                                    const priorityIdx = variants.findIndex(v => v.type.includes('頭') && parseInt(v.id) >= 70 && parseInt(v.id) <= 76);
                                    if (priorityIdx !== -1) {
                                        selectedIndex = priorityIdx;
                                    } else {
                                        const headIdx = variants.findIndex(v => v.type.includes('頭'));
                                        if (headIdx !== -1) selectedIndex = headIdx;
                                    }
                                } else {
                                    // 在母音後的子音 -> 尾子音
                                    const tailIdx = variants.findIndex(v => v.type.includes('尾'));
                                    if (tailIdx !== -1) {
                                        selectedIndex = tailIdx;
                                    } else {
                                        // 找不到尾子音變體時的防呆機制
                                        const headIdx = variants.findIndex(v => v.type.includes('頭'));
                                        if (headIdx !== -1) selectedIndex = headIdx;
                                    }
                                }
                            } else {
                                // 防呆機制：如果音節中完全沒有母音
                                if (index === lastValidIndex) {
                                    const tailIdx = variants.findIndex(v => v.type.includes('尾'));
                                    if (tailIdx !== -1) selectedIndex = tailIdx;
                                    else {
                                        const headIdx = variants.findIndex(v => v.type.includes('頭'));
                                        if (headIdx !== -1) selectedIndex = headIdx;
                                    }
                                } else {
                                    const priorityIdx = variants.findIndex(v => v.type.includes('頭') && parseInt(v.id) >= 70 && parseInt(v.id) <= 76);
                                    if (priorityIdx !== -1) selectedIndex = priorityIdx;
                                    else {
                                        const headIdx = variants.findIndex(v => v.type.includes('頭'));
                                        if (headIdx !== -1) selectedIndex = headIdx;
                                    }
                                }
                            }
                        }
                    }
                    const card = createCard(variants, selectedIndex, token);
                    col.appendChild(card);
                });
                wordContainer.appendChild(col);
            });
        }
        function createStressCard(token) {
            const div = document.createElement('div');
            div.className = "w-full h-8 md:h-12 flex items-center justify-center bg-yellow-50 rounded-lg border border-yellow-200 mb-1 flex-shrink-0";
            const symbolHtml = token === 'ˈ'
                ? `<span class="text-xl md:text-3xl font-serif font-bold text-slate-800">ˈ</span>`
                : `<span class="text-xl md:text-3xl font-serif font-bold text-slate-600">ˌ</span>`;
            div.innerHTML = `
                ${symbolHtml}
                <span class="text-[8px] md:text-xs text-gray-500 font-mono ml-1 md:ml-2">${token === 'ˈ' ? '主重音' : '次重音'}</span>
            `;
            return div;
        }
        function createPunctuationCard(token) {
            const div = document.createElement('div');
            // 特製一個小巧、低調的灰底括號區塊
            div.className = "w-full h-8 md:h-12 flex items-center justify-center bg-slate-50 rounded-lg border border-slate-200 mb-1 flex-shrink-0 shadow-sm";
            div.innerHTML = `
                <span class="text-xl md:text-2xl font-mono font-bold text-slate-400">${token}</span>
            `;
            return div;
        }
        function createCard(variants, initialIndex, token) {
            const container = document.createElement('div');
            // 改為 w-full 讓其隨父元素 (.syllable-col) 一起等比例縮小
            container.className = "relative group w-full flex-shrink-0";

            let currentIndex = initialIndex;
            function updateCardContent() {
                const item = variants[currentIndex];
                const hasMultiple = variants.length > 1;
                let badgeClass = "bg-gray-100 text-gray-600";
                if (item.type.includes('頭')) badgeClass = "bg-emerald-100 text-emerald-700";
                if (item.type.includes('尾')) badgeClass = "bg-amber-100 text-amber-700";
                if (item.type.includes('母')) badgeClass = "bg-rose-100 text-rose-700";
                // 判斷是否為 70~76 之間較長的圖卡
                const isLongCard = item.id && parseInt(item.id) >= 70 && parseInt(item.id) <= 76;
                // 若為長圖卡，使用 h-auto 讓圖片自行撐開高度；一般圖卡則設定 aspect-[3/4] 確保長寬比等比例縮放
                const cardHeightClass = isLongCard ? "h-auto" : "aspect-[3/4]";
                const imgClass = isLongCard ? "w-full h-auto object-contain select-none" : "w-full h-full object-contain select-none";
                container.innerHTML = `
                    <div class="bg-white rounded-xl border-2 border-slate-200 overflow-hidden hover:border-blue-400 transition-all cursor-pointer card-shadow flex flex-col relative w-full ${cardHeightClass}"
                         title="${hasMultiple ? '點擊切換變體 (頭/尾/母)' : ''}">

                        <div class="px-1 md:px-2 py-1 bg-slate-50 border-b border-slate-100 flex justify-between items-center flex-shrink-0 min-w-0">
                            <span class="font-bold text-slate-700 font-mono text-xs md:text-base truncate mr-1">/${token}/</span>
                            <span class="text-[8px] md:text-[10px] px-1 py-0.5 rounded ${badgeClass} whitespace-nowrap flex-shrink-0">${item.type || '通用'}</span>
                        </div>
                        <div class="flex-grow relative bg-white flex items-center justify-center p-1 min-h-0 w-full">
                            <img src="${item.img}"
                                 class="${imgClass}"
                                 alt="${token}"
                                 referrerpolicy="no-referrer"
                                 onerror="this.style.opacity=0.3; this.parentElement.innerHTML='<span class=\'text-[10px] md:text-xs text-red-300\'>無圖片</span>'">

                            ${hasMultiple ? `
                                <div class="absolute bottom-1 right-1 bg-black/10 text-slate-500 rounded-full w-4 h-4 md:w-5 md:h-5 flex items-center justify-center text-[8px] md:text-[10px] group-hover:bg-blue-500 group-hover:text-white transition-colors">
                                    <i class="fa-solid fa-rotate"></i>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
            updateCardContent();
            if (variants.length > 1) {
                container.addEventListener('click', () => {
                    currentIndex = (currentIndex + 1) % variants.length;
                    updateCardContent();
                });
            }
            return container;
        }
        function createUnknownCard(token) {
            const div = document.createElement('div');
            // 改為 w-full 及 aspect-[3/4] 依比例縮放
            div.className = "w-full aspect-[3/4] bg-slate-50 rounded-xl border-2 border-dashed border-slate-300 flex flex-col items-center justify-center text-slate-400 p-1";
            div.innerHTML = `
                <span class="text-lg md:text-2xl font-bold mb-1">?</span>
                <span class="font-mono text-xs md:text-base truncate w-full text-center">/${token}/</span>
                <span class="text-[8px] md:text-[10px] mt-1">未知</span>
            `;
            return div;
        }
    </script>
</body>
</html>
