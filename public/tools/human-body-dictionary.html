<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>人體音典</title>
<style>
  :root{ --bg:#0f1420; --panel:#171e2e; --text:#e8edf5; --muted:#8fa0bd; --hi:#9db8e0;
    --accent:#5ec9a8; --sel:#7ee0c0; --bone:#efe8d6; --bone-stroke:#b9ab86; --hi-stroke:#e0a800; --sel-stroke:#1f7a5a; }
  *{box-sizing:border-box}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:system-ui,"PingFang TC","Microsoft JhengHei",sans-serif; }
  header{ text-align:center; padding:20px 14px 6px; }
  header h1{ margin:0; font-size:1.7rem; color:var(--sel); }
  header p{ margin:6px 0 0; color:var(--muted); font-size:.92rem; }
  .search{ max-width:1180px; margin:12px auto 0; padding:0 14px; }
  .search input{ width:100%; padding:12px 16px; border-radius:12px; border:1px solid #2a3550;
    background:var(--panel); color:var(--text); font-size:1rem; }
  .layout{ display:flex; gap:20px; max-width:1180px; margin:14px auto; padding:0 14px; align-items:flex-start; flex-wrap:wrap; }
  .left{ flex:1 1 360px; min-width:300px; }
  .stage{ background:radial-gradient(ellipse at 50% 35%,#20293d,#131a29); border:1px solid #2a3550;
    border-radius:16px; padding:10px; position:relative; margin-bottom:14px; }
  .stage svg{ width:100%; height:auto; display:block; touch-action:manipulation; }
  .view-toggle{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; }
  .view-toggle button{ background:#232f47; color:var(--text); border:1px solid #37456a; border-radius:8px;
    padding:6px 12px; font-size:.82rem; cursor:pointer; }
  .view-toggle button.active{ background:var(--accent); color:#04121e; border-color:var(--accent); font-weight:700; }
  .legend{ text-align:center; color:var(--muted); font-size:.76rem; margin-top:8px; }
  .index{ background:var(--panel); border:1px solid #2a3550; border-radius:16px; padding:14px 16px; }
  .cat{ margin-bottom:12px; }
  .cat > h3{ font-size:.82rem; color:var(--hi); letter-spacing:.5px; margin:0 0 8px;
    border-bottom:1px dashed #37456a; padding-bottom:4px; }
  .chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ background:#202a40; border:1px solid #33415f; border-radius:8px; padding:5px 10px; font-size:.82rem; cursor:pointer; white-space:nowrap; }
  .chip:hover{ border-color:var(--accent); color:var(--accent); }
  .chip.selected{ background:var(--sel); color:#04121e; border-color:var(--sel); font-weight:700; }
  .chip .en{ color:var(--muted); font-size:.72rem; margin-left:4px; }
  .chip.selected .en{ color:#053; }
  .panel{ flex:1 1 320px; min-width:290px; background:var(--panel); border:1px solid #2a3550;
    border-radius:16px; padding:24px; position:sticky; top:18px; min-height:360px; }
  .panel .placeholder{ color:var(--muted); text-align:center; padding-top:60px; line-height:1.9; }
  .panel .tag{ display:inline-block; background:#26324c; color:var(--accent); font-size:.72rem; padding:3px 10px; border-radius:20px; margin-bottom:14px; }
  .panel h2{ font-size:1.7rem; color:var(--sel); margin:0; }
  .panel .en-row{ display:flex; align-items:center; gap:10px; margin:8px 0 2px; flex-wrap:wrap; }
  .panel .en{ color:var(--text); font-size:1.15rem; }
  .panel .meta{ color:var(--muted); font-size:.82rem; margin:2px 0 4px; }
  .part{ fill:#e7edf6; stroke:#8ea6c8; stroke-width:1.3; cursor:pointer; transition:fill .15s,stroke .15s; }
  .part:hover{ fill:#a9e5cf; } .part.selected{ fill:var(--sel); stroke:#1f7a5a; stroke-width:1.8; }
  .bone{ fill:var(--bone); stroke:var(--bone-stroke); stroke-width:1.4; cursor:pointer; transition:fill .12s,stroke .12s; }
  .bone:hover{ fill:#a9e5cf; } .bone.selected{ fill:var(--sel); stroke:var(--sel-stroke); stroke-width:2; }
  .sbone{ fill:#e7edf6; stroke:#8ea6c8; stroke-width:1.4; cursor:pointer; transition:fill .15s,stroke .15s; }
  .sbone:hover{ fill:#a9e5cf; } .sbone.selected{ fill:var(--sel); stroke:var(--sel-stroke); }
  .soutline{ fill:none; stroke:#42557d; stroke-width:1.6; pointer-events:none; }
  .slabel{ fill:#20304d; font-size:12px; font-weight:700; text-anchor:middle; pointer-events:none; }
  .deco{ fill:#eef3fa; stroke:#8ea6c8; stroke-width:1.6; pointer-events:none; }
  .facial{ stroke-width:1.3; }
  .vsep{ align-self:center; color:var(--muted); font-size:.72rem; padding:0 2px 0 8px; border-left:1px solid #33415f; margin-left:4px; }
  .vsep:first-child{ border-left:none; margin-left:0; padding-left:0; }
  .subcat{ margin:6px 0 8px; } .subcat h4{ margin:0 0 5px; font-size:.72rem; color:var(--muted); font-weight:600; }
  .cat > h3{ color:var(--sel); }
  .cat{ margin-bottom:8px; border:1px solid #2a3550; border-radius:12px; overflow:hidden; }
  .cat > summary{ cursor:pointer; list-style:none; padding:12px 14px; font-size:.96rem; font-weight:700; color:var(--sel); background:#1a2233; display:flex; align-items:center; gap:8px; }
  .cat > summary::-webkit-details-marker{ display:none; }
  .cat .cnt{ margin-left:auto; font-size:.72rem; color:var(--muted); font-weight:400; }
  .cat > summary::after{ content:"▾"; color:var(--muted); transition:transform .15s; }
  .cat[open] > summary::after{ transform:rotate(180deg); }
  .cat > .subcat{ padding:2px 14px; } .cat > .subcat:first-of-type{ padding-top:8px; } .cat > .subcat:last-of-type{ padding-bottom:10px; }
  .sil{ fill:#eaf2fb; opacity:.07; stroke:#9db8e0; stroke-width:1.2; pointer-events:none; }
  .msep{ stroke:#7f97b8; stroke-width:.9; fill:none; pointer-events:none; opacity:.65; }
  .mlabel{ fill:#eaf1fb; font-size:11px; font-weight:700; text-anchor:middle; pointer-events:none; paint-order:stroke; stroke:#0f1420; stroke-width:2.4px; stroke-linejoin:round; }
  .stitle{ fill:var(--sel); font-size:14px; font-weight:700; } .scap{ fill:var(--muted); font-size:11px; }
  .ph-mw{ font-family:"Times New Roman",serif; font-size:1.18rem; margin:14px 0 2px; color:var(--hi); } .ph-mw b{ color:var(--sel); }
  .blocks{ display:flex; gap:10px; flex-wrap:wrap; margin:12px 0; padding:12px; background:#f4f8ff; border:1px solid #cdd9e8; border-radius:12px; align-items:flex-start; }
  .syl{ position:relative; display:flex; flex-direction:column; align-items:center; gap:4px; padding:9px 9px 6px; background:#fff; border:1px solid #d7e0ee; border-radius:10px; min-width:46px; }
  .syl.s1{ border:2px solid #e53e3e; box-shadow:0 0 0 3px #fde8e8; } .syl.s2{ border:2px solid #dd9b3c; box-shadow:0 0 0 3px #fdf1de; }
  .syl img{ width:32px; height:auto; display:block; } .syl img.clus{ width:44px; }
  .stress{ position:absolute; top:-10px; font-size:9px; color:#fff; border-radius:6px; padding:1px 6px; white-space:nowrap; } .st1{ background:#e53e3e; } .st2{ background:#dd9b3c; }
  .pillrow{ display:flex; gap:3px; margin-top:2px; flex-wrap:wrap; justify-content:center; }
  .pill{ font-size:9px; color:#fff; border-radius:6px; padding:1px 5px; } .p-onset{ background:#3182ce; } .p-vowel{ background:#e53e3e; } .p-coda{ background:#2d3748; }
  .pbtns{ display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; align-items:center; }
  .pbtn{ padding:10px 15px; border:none; border-radius:10px; cursor:pointer; font-size:.92rem; color:#04121e; text-decoration:none; display:inline-flex; align-items:center; gap:6px; font-weight:700; }
  .pb1{ background:var(--accent); } .pb2{ background:#7ee0c0; } .pb3{ background:transparent; color:var(--accent); border:1px solid var(--accent); }
  .noaud{ font-size:.8rem; color:#f0b366; }
  .pdefs{ margin-top:16px; font-size:.86rem; line-height:1.75; color:var(--muted); }
  .pdefs .lab{ display:inline-block; font-size:.68rem; background:#26324c; color:var(--accent); border-radius:5px; padding:1px 7px; margin-right:6px; }
  .pdefs .en_def{ font-family:Georgia,serif; color:#cdd8ea; }
  footer{ text-align:center; color:var(--muted); font-size:.74rem; margin:16px 14px 26px; }
  /* 手機直向：上下堆疊、圖大、點選捲到資訊面板 */
  @media(max-width:820px) and (orientation:portrait){
    .layout{ flex-direction:column; } .left{ display:contents; }
    .stage{ order:1 } .panel{ order:2; position:static; box-shadow:0 0 0 2px var(--accent); scroll-margin-top:6px; } .index{ order:3 }
    .stage svg{ width:100%; height:auto; }
    .pbtns{ margin-top:10px; } .pbtn{ padding:13px 18px; font-size:1.02rem; flex:1 1 40%; justify-content:center; } .pb3{ flex-basis:100%; }
  }
  /* 手機橫向：左圖右資訊，像電腦 */
  @media(max-width:960px) and (orientation:landscape){
    .layout{ flex-direction:row; align-items:flex-start; }
    .left{ flex:1 1 50%; min-width:0; } .panel{ flex:1 1 46%; min-width:0; position:sticky; top:8px; max-height:94vh; overflow:auto; }
    .stage svg{ max-height:86vh; width:100%; height:auto; }
    .pbtn{ padding:11px 15px; }
  }
  @media(max-width:560px){ .syl img{width:28px} .syl img.clus{width:38px} .panel{padding:18px} }
</style></head><body>

const NBYEN={}; TERMS.forEach((t,i)=>{ t._i=i; NBYEN[_norm(t.en)]=t; });

let curView="ext_body", selIdx=null, curQ="";

let stopFlag=false;
function playSeq(urls,rate){stopFlag=true;setTimeout(function(){stopFlag=false;var i=0;function nx(){if(stopFlag&&i>0)return;if(i>=urls.length)return;var a=new Audio(urls[i]);a.playbackRate=rate;try{a.preservesPitch=true;a.mozPreservesPitch=true;a.webkitPreservesPitch=true;}catch(e){}a.onended=function(){i++;setTimeout(nx,rate<0.9?350:250);};a.play().catch(function(){});}nx();},60);}
function buildTabs(){ document.getElementById('vt').innerHTML=VIEWS.map(v=> v.sep?`<span class="vsep">${v.sep}</span>`:`<button data-v="${v.id}" class="${v.id===curView?'active':''}">${v.label}</button>`).join(''); document.querySelectorAll('#vt button').forEach(b=>b.addEventListener('click',()=>setView(b.dataset.v))); }
function buildIndex(){
  const sys={}; const seen=[];
  TERMS.forEach(t=>{ const s=t.grp||'其他'; if(!(s in sys)){sys[s]={o:[],n:0}; seen.push(s);} const sub=t.sub||'—'; if(!(sub in sys[s])){sys[s][sub]=[]; sys[s].o.push(sub);} sys[s][sub].push(t); sys[s].n++; });
  const order=SYS_ORDER.filter(s=>s in sys).concat(seen.filter(s=>SYS_ORDER.indexOf(s)<0));
  indexEl.innerHTML=order.map(s=>{ const body=sys[s].o.map(sub=>`<div class="subcat"><h4>${sub}</h4><div class="chips">${sys[s][sub].map(t=>`<span class="chip" data-i="${t._i}">${t.zh}<span class="en">${t.en}</span></span>`).join('')}</div></div>`).join(''); return `<details class="cat"><summary>${s}<span class="cnt">${sys[s].n} 詞</span></summary>${body}</details>`; }).join('');

function setView(v){ curView=v; document.querySelectorAll('#vt button').forEach(b=>b.classList.toggle('active',b.dataset.v===v)); render(); }
function render(){

function markFig(i){
  fig.querySelectorAll('.part.selected,.bone.selected,.sbone.selected').forEach(b=>b.classList.remove('selected'));

}
function markChip(i){ indexEl.querySelectorAll('.chip.selected').forEach(c=>c.classList.remove('selected')); const ch=indexEl.querySelector(`.chip[data-i="${i}"]`); if(ch) ch.classList.add('selected'); }
function select(i){
  selIdx=i; const t=TERMS[i];
  const hit=(t._views||[]).find(x=>x[0]===curView);
  if(!hit && t._views && t._views.length){ setView(t._views[0][0]); } else { markFig(i); }
  markChip(i);
  let html="";

}
